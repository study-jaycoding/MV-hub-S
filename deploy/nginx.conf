# ============================================================================
#  content-hub-server 앞단 리버스 프록시 (선택 — Phase 2 미디어 분리 서빙)
#
#  목적: 결과물·소스 미디어(/media)와 SPA 정적 번들을 nginx 가 디스크에서 직접
#        서빙해 uvicorn(백엔드) 부하를 분리한다. 수만 건·동시 다운로드가 많아져도
#        API 처리 스레드가 정적 파일 전송에 막히지 않는다.
#
#  핵심: 단일 오리진을 그대로 유지 → 프론트엔드는 무변경(상대경로 /api·/ws·/media).
#        nginx 가 /media·정적은 직접, /api·/ws 만 백엔드(127.0.0.1:8010)로 프록시.
#
#  실행(예): nginx -c <이 파일의 절대경로>   또는 nginx 의 conf.d 에 포함.
#  접속:  http://<이 PC>:8080   (백엔드 8010 은 nginx 뒤로 숨김)
#
#  ⚠️ 인증(CONTENT_HUB_AUTH=1) 사용 시 주의: 백엔드는 /media 도 세션으로 보호하지만
#     nginx 가 /media 를 직접 서빙하면 그 보호를 우회한다. AUTH 를 켤 거면 아래 /media
#     블록을 빼고(백엔드가 서빙하도록) 두거나, auth_request 로 백엔드 검증을 붙여라.
#     기본(AUTH off)에서는 그대로 사용해도 된다.
# ============================================================================

upstream content_hub_backend {
    server 127.0.0.1:8010;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;
    client_max_body_size 1024m;          # 에셋 드롭 업로드(대용량) 허용

    # ── 결과물·소스 미디어: nginx 가 디스크에서 직접(샤딩 /media/<2>/<sha>.ext) ──
    location /media/ {
        alias        D:/ClaudeCode/content-hub-server/backend/data/media/;
        expires      30d;                # 내용주소(sha) 파일이라 영구 캐시 안전
        add_header   Cache-Control "public, immutable";
        access_log   off;
        try_files    $uri =404;
    }

    # ── SPA 정적 번들(해시 파일명 → 장기 캐시) ──
    location /assets/ {
        alias    D:/ClaudeCode/content-hub-server/frontend/dist/assets/;
        expires  7d;
    }

    # ── API: 백엔드로 프록시 ──
    location /api/ {
        proxy_pass         http://content_hub_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;          # 동기화·캐시올인 등 긴 작업 대비
    }

    # ── WebSocket(진행률 실시간) ──
    location /ws {
        proxy_pass            http://content_hub_backend;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host $host;
        proxy_read_timeout    3600s;       # idle 끊김 방지(앱이 25s ping 도 보냄)
    }

    # ── 그 외 = SPA 진입점(클라이언트 라우팅) ──
    location / {
        root       D:/ClaudeCode/content-hub-server/frontend/dist;
        try_files  $uri /index.html;
    }
}
